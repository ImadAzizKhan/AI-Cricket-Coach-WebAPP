<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cricket Coach: Target Practice</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #121212; color: white; margin: 0; padding: 20px; text-align: center; }
        .card { background-color: #1e1e1e; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-top: 4px solid #FF9800;}
        h2 { margin-top: 0; color: #FF9800; }
        .score-board { font-size: 24px; font-weight: bold; margin-bottom: 15px; }
        select, button { width: 100%; padding: 15px; font-size: 18px; border-radius: 8px; border: none; margin-top: 10px; }
        select { background-color: #333; color: white; }
        
        #readyBtn { background-color: #4CAF50; color: white; font-weight: bold; cursor: pointer; transition: 0.3s;}
        #readyBtn:disabled { background-color: #888; }
        
        .reference-box { background-color: #2c2c2c; padding: 15px; border-radius: 8px; text-align: left; margin: 15px 0; font-size: 15px;}
        .reference-box ul { padding-left: 20px; margin: 5px 0; }
        
        .review-box { display: none; background-color: #333; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .review-title { font-size: 20px; font-weight: bold; margin-bottom: 10px;}
        .error-list { color: #ff5252; text-align: left; padding-left: 20px; font-size: 16px;}
        .success-text { color: #69f0ae; font-weight: bold; font-size: 18px;}

        @keyframes shake {
            0% { transform: translateX(0); } 25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); } 75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        .shake { animation: shake 0.3s; }
    </style>
</head>
<body>

    <div class="score-board">Total Score: <span id="scoreVal" style="color: #4CAF50;">0</span></div>

    <div class="card" id="mainCard">
        <h2>Select Practice Shot</h2>
        
        <select id="lessonSelect">
            <option value="Cover Drive">Cover Drive</option>
            <option value="Defensive">Defensive</option>
            <option value="Down The Wicket">Down The Wicket</option>
            <option value="Lofted Legside">Lofted Legside</option>
            <option value="Lofted Offside">Lofted Offside</option>
            <option value="Sweep">Sweep</option>
            <option value="Upper Cut">Upper Cut</option>
        </select>

        <div class="reference-box" id="refBox">
            <div style="background-color: #222; border-radius: 8px; margin-top: 15px; padding: 10px;">
            <canvas id="skeletonCanvas" width="200" height="250"></canvas>
        </div>
            <strong>Target Form:</strong>
            <ul id="focusPoints">
                <li>Front elbow must be high (>120°)</li>
                <li>Head positioned close to the bat</li>
                <li>Front knee bent to lean in</li>
            </ul>
        </div>
        
        <button id="readyBtn" onclick="startCountdown()">Start Practice (3s Delay)</button>

        <div class="review-box" id="reviewBox">
            <div class="review-title" id="reviewTitle">Reviewing Shot...</div>
            <ul class="error-list" id="errorList"></ul>
            <button onclick="resetLesson()" style="background-color: #FF9800;">Try Again</button>
        </div>
    </div>

    <script>
        const socket = io();
        let score = 0;

        // FIXED: Exact match for the 7 CricShot10k classes
        const targets = {
            "Cover Drive": ["Front elbow must be high (>120°)", "Head positioned close to the bat", "Front knee bent to lean in"],
            "Defensive": ["Bat and pad close together", "Soft hands (don't push hard)", "Play right under your eyes"],
            "Down The Wicket": ["Take a big stride to the pitch of the ball", "Keep your head still while advancing"],
            "Lofted Legside": ["Clear your front leg", "Follow through completely with bottom hand"],
            "Lofted Offside": ["Fully extend arms to get under the ball", "Keep a strong base, bend front knee"],
            "Sweep": ["Drop back knee low to ground", "Extend arms through the sweep"],
            "Upper Cut": ["Wait for it! Play it late over your shoulder", "Guide the ball, don't slash hard"]
        };

        // When user selects a new shot
        document.getElementById('lessonSelect').addEventListener('change', function(e) {
            const shot = e.target.value;
            socket.emit('set_target_shot', { shot: shot });
            
            // Update the bullet points on the screen
            const list = document.getElementById('focusPoints');
            list.innerHTML = "";
            targets[shot].forEach(point => {
                list.innerHTML += `<li>${point}</li>`;
            });
        });

        function drawGhostSkeleton(shot) {
            const canvas = document.getElementById('skeletonCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            
            ctx.strokeStyle = "rgba(0, 255, 255, 0.5)"; 
            ctx.lineWidth = 4;
            ctx.lineCap = "round";
            
            let head = {x: 100, y: 50};
            let shoulder = {x: 100, y: 80};
            let frontHip = {x: 90, y: 150}; let backHip = {x: 110, y: 150};
            let frontKnee, frontFoot, backKnee, backFoot, frontElbow, frontWrist;

            if(shot === "Cover Drive") {
                frontKnee = {x: 50, y: 180}; frontFoot = {x: 40, y: 230}; 
                backKnee = {x: 120, y: 190}; backFoot = {x: 130, y: 230}; 
                frontElbow = {x: 60, y: 60}; frontWrist = {x: 40, y: 120}; 
            } 
            else if(shot === "Sweep") { // Updated name for ghost skeleton
                frontKnee = {x: 50, y: 230}; frontFoot = {x: 40, y: 230}; // Kneeling
                backKnee = {x: 140, y: 230}; backFoot = {x: 160, y: 230}; 
                frontElbow = {x: 130, y: 100}; frontWrist = {x: 160, y: 100}; // Horizontal sweep
            }
            else { // Default Stance
                frontKnee = {x: 90, y: 190}; frontFoot = {x: 90, y: 230}; 
                backKnee = {x: 110, y: 190}; backFoot = {x: 110, y: 230};
                frontElbow = {x: 80, y: 100}; frontWrist = {x: 80, y: 140};
            }

            function drawLine(p1, p2) {
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            }

            ctx.beginPath(); ctx.arc(head.x, head.y, 15, 0, Math.PI*2); ctx.stroke(); 
            drawLine(head, shoulder); 
            drawLine(shoulder, frontHip); drawLine(shoulder, backHip); 
            drawLine(frontHip, frontKnee); drawLine(frontKnee, frontFoot); 
            drawLine(backHip, backKnee); drawLine(backKnee, backFoot); 
            drawLine(shoulder, frontElbow); drawLine(frontElbow, frontWrist); 
        }

        document.getElementById('lessonSelect').addEventListener('change', function(e) {
            drawGhostSkeleton(e.target.value);
        });

        // Initialize
        drawGhostSkeleton("Cover Drive");

        function startCountdown() {
            const btn = document.getElementById('readyBtn');
            const select = document.getElementById('lessonSelect');
            let countdown = 3; 
            
            btn.disabled = true;
            select.disabled = true;

            const timer = setInterval(() => {
                btn.innerText = `Recording in... ${countdown}`;
                countdown--;

                if(countdown < 0) {
                    clearInterval(timer);
                    btn.innerText = "Evaluating Frame!";
                    socket.emit('trigger_evaluation'); 
                }
            }, 1000);
        }

        socket.on('shot_review', function(data) {
            const reviewBox = document.getElementById('reviewBox');
            const title = document.getElementById('reviewTitle');
            const errorList = document.getElementById('errorList');
            const btn = document.getElementById('readyBtn');
            
            btn.style.display = 'none'; 
            reviewBox.style.display = 'block'; 
            errorList.innerHTML = "";

            if (data.status === 'success') {
                score += data.points;
                document.getElementById('scoreVal').innerText = score;
                title.innerHTML = `<span class="success-text">Perfect Form! +${data.points}</span>`;
                // Also show AI confidence!
                errorList.innerHTML += `<li style="color:white;">AI Confidence: ${data.confidence.toFixed(1)}%</li>`;
            } else {
                title.innerHTML = `<span style="color:#ff5252;">Form Errors Detected:</span>`;
                data.errors.forEach(err => {
                    errorList.innerHTML += `<li>${err}</li>`;
                });
                triggerVibration(); 
            }
        });

        function triggerVibration() {
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            const card = document.getElementById('mainCard');
            card.classList.remove('shake');
            void card.offsetWidth;
            card.classList.add('shake');
        }

        function resetLesson() {
            document.getElementById('reviewBox').style.display = 'none';
            const btn = document.getElementById('readyBtn');
            btn.style.display = 'block';
            btn.disabled = false;
            btn.innerText = "Start Practice (3s Delay)";
            document.getElementById('lessonSelect').disabled = false;
        }

        // --- NATIVE BROWSER VOICE RECOGNITION ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = true; 
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onstart = function() {
                console.log("Voice Recognition started.");
            };

            recognition.onresult = function(event) {
                const last = event.results.length - 1;
                const command = event.results[last][0].transcript.trim().toLowerCase();
                console.log("Heard: ", command);

                if (command.includes("start") || command.includes("ready")) {
                    console.log("Voice Command: Starting practice...");
                    // Give visual feedback via button text
                    document.getElementById('readyBtn').innerText = "🎤 Voice Activated!";
                    startCountdown(); 
                } 
                else if (command.includes("next") || command.includes("reset") || command.includes("again")) {
                    console.log("Voice Command: Resetting...");
                    resetLesson();
                }
            };

            recognition.onerror = function(event) {
                console.error("Speech Recognition Error: ", event.error);
            };

            recognition.start();
        } else {
            console.warn("Speech Recognition API not supported in this browser.");
        }
    </script>
</body>
</html>
